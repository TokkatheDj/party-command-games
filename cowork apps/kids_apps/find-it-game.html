<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hidden World Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700&display=swap" rel="stylesheet">
    <style>:root {
    --primary: #FF6B6B;
    --secondary: #4ECDC4;
    --accent: #FFE66D;
    --dark: #2C3E50;
    --light: #F7FFF7;
    --success: #6BCB77;
    --font-heading: 'Fredoka One', cursive;
    --font-body: 'Nunito', sans-serif;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    user-select: none; /* Prevent selection */
    -webkit-tap-highlight-color: transparent;
}

body {
    font-family: var(--font-body);
    background-color: var(--dark);
    color: var(--dark);
    overflow: hidden;
}

#app {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: #a8e6cf;
}

/* Screens */
.screen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    flex-direction: column;
}
.screen.active {
    display: flex;
}

/* Splash Screen */
#splash-screen {
    background: linear-gradient(135deg, var(--secondary), var(--primary));
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
}

.logo-title {
    font-family: var(--font-heading);
    font-size: 4rem;
    margin-bottom: 2rem;
    text-shadow: 4px 4px 0 rgba(0,0,0,0.2);
    animation: float 3s ease-in-out infinite;
}

/* Buttons */
.btn-primary {
    background: var(--accent);
    color: var(--dark);
    font-family: var(--font-heading);
    font-size: 2rem;
    padding: 1rem 3rem;
    border: 4px solid var(--dark);
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 8px 0 var(--dark);
    transition: all 0.1s;
}
.btn-primary:active {
    transform: translateY(8px);
    box-shadow: 0 0 0 var(--dark);
}

.btn-icon {
    background: white;
    border: 3px solid var(--dark);
    border-radius: 50%;
    width: 50px; height: 50px;
    font-size: 1.5rem;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--dark);
}
.btn-icon:active {
    transform: translateY(4px);
    box-shadow: 0 0 0 var(--dark);
}

.btn-action {
    background: var(--accent);
    border: 3px solid var(--dark);
    border-radius: 20px;
    padding: 0.5rem 1rem;
    font-family: var(--font-heading);
    font-size: 1.2rem;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--dark);
}
.btn-action:active {
    transform: translateY(4px);
    box-shadow: 0 0 0 var(--dark);
}
.btn-action:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: 0 4px 0 var(--dark);
}

/* Level Select */
.header {
    background: white;
    padding: 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 4px solid var(--dark);
}
.header h2 {
    font-family: var(--font-heading);
    font-size: 2rem;
    color: var(--primary);
}

.map-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #8de2f3;
    padding: 10px;
}
.map-container {
    position: relative;
    width: 100%;
    height: 100%;
    max-width: min(100vw - 20px, 100vh - 120px);
    max-height: min(100vw - 20px, 100vh - 120px);
    aspect-ratio: 1 / 1;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    border-radius: 20px;
    overflow: hidden;
}
.map-bg {
    width: 100%;
    height: 100%;
    background: url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20400%20400%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22sky%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%221%22%20y2%3D%221%22%3E%3Cstop%20offset%3D%220%25%22%20stop-color%3D%22%2387ceeb%22%2F%3E%3Cstop%20offset%3D%2245%25%22%20stop-color%3D%22%2398d98e%22%2F%3E%3Cstop%20offset%3D%22100%25%22%20stop-color%3D%22%23e8c477%22%2F%3E%3C%2FlinearGradient%3E%3C%2Fdefs%3E%3Crect%20width%3D%22400%22%20height%3D%22400%22%20fill%3D%22url(%23sky)%22%2F%3E%3Ccircle%20cx%3D%2260%22%20cy%3D%2260%22%20r%3D%2230%22%20fill%3D%22%23ffe27a%22%2F%3E%3Cg%20fill%3D%22%23ffffff%22%20opacity%3D%220.9%22%3E%3Cellipse%20cx%3D%22300%22%20cy%3D%2270%22%20rx%3D%2233.6%22%20ry%3D%2219.2%22%2F%3E%3Cellipse%20cx%3D%22273.6%22%20cy%3D%2274.8%22%20rx%3D%2221.599999999999998%22%20ry%3D%2214.399999999999999%22%2F%3E%3Cellipse%20cx%3D%22326.4%22%20cy%3D%2274.8%22%20rx%3D%2221.599999999999998%22%20ry%3D%2214.399999999999999%22%2F%3E%3Cellipse%20cx%3D%22300%22%20cy%3D%2258%22%20rx%3D%2219.2%22%20ry%3D%2215.6%22%2F%3E%3C%2Fg%3E%3Cg%20fill%3D%22%23ffffff%22%20opacity%3D%220.9%22%3E%3Cellipse%20cx%3D%22150%22%20cy%3D%2250%22%20rx%3D%2225.2%22%20ry%3D%2214.4%22%2F%3E%3Cellipse%20cx%3D%22130.2%22%20cy%3D%2253.6%22%20rx%3D%2216.2%22%20ry%3D%2210.8%22%2F%3E%3Cellipse%20cx%3D%22169.8%22%20cy%3D%2253.6%22%20rx%3D%2216.2%22%20ry%3D%2210.8%22%2F%3E%3Cellipse%20cx%3D%22150%22%20cy%3D%2241%22%20rx%3D%2214.4%22%20ry%3D%2211.700000000000001%22%2F%3E%3C%2Fg%3E%3Cpath%20d%3D%22M0%2C250%20Q100%2C228%20200%2C250%20T400%2C250%20L400%2C400%20L0%2C400%20Z%22%20fill%3D%22%237fbf6f%22%2F%3E%3Cpath%20d%3D%22M0%2C300%20Q100%2C284%20200%2C300%20T400%2C300%20L400%2C400%20L0%2C400%20Z%22%20fill%3D%22%236fae5a%22%2F%3E%3Cpath%20d%3D%22M0%2C340%20Q100%2C320%20200%2C345%20T400%2C335%20L400%2C400%20L0%2C400%20Z%22%20fill%3D%22%235fa8e0%22%20opacity%3D%220.55%22%2F%3E%3C%2Fsvg%3E");
    background-size: cover;
    background-position: center;
}

/* Mutes the busy illustrated map (which has its own decorative, non-clickable
   numbers painted into the art) so the real interactive nodes read clearly
   as buttons by contrast. */
.map-dim {
    display: none;
}

.level-nodes {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
}

.level-path {
    display: none !important;
}
.path-line-outline {
    fill: none;
    stroke: var(--dark);
    stroke-width: 2.2;
    stroke-linecap: round;
}
.path-line {
    fill: none;
    stroke: white;
    stroke-width: 1.1;
    stroke-linecap: round;
    stroke-dasharray: 2.5 2.5;
}

.level-node {
    position: absolute;
    width: 74px;
    min-height: 74px;
    background: white;
    border: 3px solid var(--dark);
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    padding: 5px 3px;
    cursor: pointer;
    box-shadow: 0 5px 0 var(--dark);
    transform: translate(-50%, -50%);
    transition: transform 0.2s;
    z-index: 5;
}
.level-node:hover:not(.locked) {
    transform: translate(-50%, -55%) scale(1.08);
}
.level-node.locked {
    background: #ccc;
    cursor: not-allowed;
    opacity: 0.75;
}
.level-node.completed {
    border-color: var(--success);
}
.level-node.next-up {
    border-color: var(--accent);
    animation: glowPulse 1s ease-in-out infinite;
}
.node-icon {
    font-size: 1.5rem;
    line-height: 1;
}
.node-label {
    font-family: var(--font-heading);
    font-size: 0.5rem;
    color: var(--dark);
    text-align: center;
    line-height: 1.05;
    max-width: 68px;
}
.level-node.locked .node-label {
    color: #777;
}
.node-stars {
    font-size: 0.75rem;
    position: absolute;
    bottom: -18px;
    white-space: nowrap;
}
.node-pointer {
    position: absolute;
    top: -26px;
    font-family: var(--font-heading);
    font-size: 0.85rem;
    background: var(--accent);
    border: 3px solid var(--dark);
    border-radius: 12px;
    padding: 2px 8px;
    white-space: nowrap;
    animation: pointerBob 1s ease-in-out infinite;
}
@keyframes glowPulse {
    0%, 100% { box-shadow: 0 5px 0 var(--dark), 0 0 0 2px rgba(255, 230, 109, 0.5); }
    50% { box-shadow: 0 5px 0 var(--dark), 0 0 0 7px rgba(255, 230, 109, 0.85); }
}
@keyframes pointerBob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
}

/* Game Screen */
.game-hud {
    background: white;
    padding: 6px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 3px solid var(--dark);
    z-index: 10;
}
.game-hud .btn-action {
    font-size: 1rem;
    padding: 4px 10px;
    border-radius: 12px;
}
.timer-container {
    font-family: var(--font-heading);
    font-size: 1.1rem;
    background: var(--dark);
    color: white;
    padding: 2px 10px;
    border-radius: 12px;
}

.game-area-container {
    flex: 1;
    overflow: hidden;
    position: relative;
    background: #333;
    display: flex;
    align-items: center;
    justify-content: center;
}
.game-area {
    position: relative;
    width: 100%;
    height: 100%;
    max-width: min(100vw - 20px, 100vh - 120px);
    max-height: min(100vw - 20px, 100vh - 120px);
    aspect-ratio: 1 / 1;
    container-type: size;
}
#game-bg {
    display: block;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
}
#objects-layer, #hint-layer {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
}
.hidden-object {
    position: absolute;
    pointer-events: auto;
    cursor: pointer;
    opacity: 0.58;
    transform: translate(-50%, -50%);
    transition: transform 0.2s, opacity 0.2s;
}
.hidden-object svg {
    width: 100%; height: 100%;
    filter: drop-shadow(1px 1px 0px rgba(0,0,0,0.12));
}
.hidden-object:hover {
    transform: translate(-50%, -50%) scale(1.04);
}

.checklist-panel {
    background: white;
    padding: 6px 12px;
    border-top: 3px solid var(--dark);
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 12px;
    overflow: hidden;
}
.checklist-panel h3 {
    font-family: var(--font-heading);
    font-size: 1rem;
    margin: 0;
    color: var(--dark);
    white-space: nowrap;
}
.checklist {
    display: flex;
    gap: 0.5rem;
    overflow-x: auto;
    flex: 1;
    padding: 2px 0;
    scrollbar-width: none;
}
.checklist::-webkit-scrollbar {
    display: none;
}
.checklist-item {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 6px;
    background: var(--dark);
    border: 2px solid var(--accent);
    border-radius: 12px;
    padding: 4px 10px;
    opacity: 1;
    transition: opacity 0.5s;
    white-space: nowrap;
}
.checklist-item.found {
    opacity: 0.3;
    filter: grayscale(100%);
    text-decoration: line-through;
}
.checklist-item svg {
    width: 20px;
    height: 20px;
    margin-bottom: 0;
    filter: drop-shadow(1px 1px 0px rgba(255,255,255,0.15));
}
.checklist-item span {
    font-weight: bold;
    font-size: 0.8rem;
    color: white;
}

/* Modals */
.modal {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
}
.modal.hidden {
    display: none;
}
.modal-content {
    background: white;
    padding: 3rem;
    border-radius: 30px;
    text-align: center;
    border: 6px solid var(--primary);
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.modal-content h2 {
    font-family: var(--font-heading);
    font-size: 3rem;
    color: var(--primary);
    margin-bottom: 1rem;
}
.stars {
    font-size: 4rem;
    margin-bottom: 1rem;
}
.modal-content p {
    font-size: 1.5rem;
    margin-bottom: 2rem;
}

/* Animations */
@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}
@keyframes popIn {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-10px); }
    40%, 80% { transform: translateX(10px); }
}
.shake {
    animation: shake 0.4s ease-in-out;
}

.particle {
    position: absolute;
    width: 20px; height: 20px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    animation: explode 0.8s ease-out forwards;
}
@keyframes explode {
    0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
}

.hint-glow {
    position: absolute;
    border: 6px dashed var(--accent);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    animation: pulseGlow 1.5s infinite;
    pointer-events: none;
}
@keyframes pulseGlow {
    0% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
    50% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
}

.penalty-indicator {
    position: absolute;
    transform: translate(-50%, -50%);
    color: #ff3333;
    font-family: var(--font-heading);
    font-size: 1.3rem;
    font-weight: bold;
    text-shadow: 2px 2px 0px #000;
    pointer-events: none;
    animation: floatUpAndFade 1s ease-out forwards;
    z-index: 15;
}

@keyframes floatUpAndFade {
    0% {
        transform: translate(-50%, -50%) translateY(0) scale(0.8);
        opacity: 0;
    }
    20% {
        transform: translate(-50%, -50%) translateY(-10px) scale(1.15);
        opacity: 1;
    }
    100% {
        transform: translate(-50%, -50%) translateY(-45px) scale(0.9);
        opacity: 0;
    }
}
</style>

        <section id="level-select-screen" class="screen">

                    <div id="objects-layer"></div>

            <div class="checklist-panel">
                <h3>Find these:</h3>
                <div id="checklist" class="checklist">
                    <!-- Items injected by JS -->
                </div>
            </div>

        <!-- Level Complete Modal -->
        <div id="level-complete-modal" class="modal hidden">
            <div class="modal-content">
                <h2>Level Complete!</h2>

                </div>
                <p id="level-time-msg">Great job finding everything!</p>
                <button id="btn-next-level" class="btn-primary">Continue</button>
            </div>
        </div>
    </div>

    <script>class GameManager {
    constructor() {
        this.currentLevel = null;
        this.foundItems = [];
        this.hintsRemaining = 3;
        this.timer = 0;
        this.timerInterval = null;
        this.isGameActive = false;

        this.sfxCorrect = document.getElementById('sfx-correct');
        this.sfxWrong = document.getElementById('sfx-wrong');
        this.sfxWin = document.getElementById('sfx-win');
        
        // Lower volume
        [this.sfxCorrect, this.sfxWrong, this.sfxWin].forEach(audio => audio.volume = 0.5);

        this.bindEvents();
    }

    bindEvents() {
        document.getElementById('btn-hint').addEventListener('click', () => this.useHint());
        document.getElementById('game-bg').addEventListener('click', (e) => {
            const rect = e.target.getBoundingClientRect();
            const xPercent = ((e.clientX - rect.left) / rect.width) * 100;
            const yPercent = ((e.clientY - rect.top) / rect.height) * 100;
            this.wrongTap(xPercent, yPercent);
        });
    }

    startLevel(levelData) {
        this.currentLevel = levelData;
        this.foundItems = [];
        this.hintsRemaining = 3;
        this.timer = 0;
        this.isGameActive = true;

        // Shuffle and partition objects into active checklist and decoys
        const shuffled = [...levelData.objects].sort(() => Math.random() - 0.5);
        const maxChecklistSize = Math.min(8, shuffled.length);
        this.checklistObjects = shuffled.slice(0, maxChecklistSize);
        this.decoyObjects = shuffled.slice(maxChecklistSize);

        this.updateHUD();
        this.renderChecklist();
        this.renderObjects();
        this.startTimer();

        // Load background (set backgroundImage, not the background shorthand,
        // so the #game-bg rule's background-size/background-position survive)
        document.getElementById('game-bg').style.backgroundImage = levelData.bg;
        document.getElementById('hint-layer').innerHTML = ''; // clear hints
    }

    renderChecklist() {
        const checklist = document.getElementById('checklist');
        checklist.innerHTML = '';
        this.checklistObjects.forEach(obj => {
            const div = document.createElement('div');
            div.className = 'checklist-item';
            div.id = `check-${obj.id}`;
            // Use SVG with currentColor for checklist to match but standard color
            const svgWithColor = obj.svg.replace(/currentColor/g, obj.color);
            div.innerHTML = `
                ${svgWithColor}
                <span>${obj.name}</span>
            `;
            checklist.appendChild(div);
        });
    }

    renderObjects() {
        const layer = document.getElementById('objects-layer');
        layer.innerHTML = '';
        
        this.currentLevel.objects.forEach(obj => {
            const div = document.createElement('div');
            div.className = 'hidden-object';
            div.id = `obj-${obj.id}`;
            div.style.left = `${obj.x}%`;
            div.style.top = `${obj.y}%`;
            
            const sizePercent = obj.size / 10.24;
            // Larger touch hitbox: minimum 48px square or 8% of the board
            div.style.width = `max(${sizePercent}cqw, 8cqw, 48px)`;
            div.style.height = `max(${sizePercent}cqw, 8cqw, 48px)`;
            div.style.color = obj.sceneColor || obj.color;

            // Apply random or defined orthogonal rotation to make visual search harder
            const rotation = obj.rotation !== undefined ? obj.rotation : (Math.floor(Math.random() * 4) * 90);
            
            // Decoupled visual presentation: centered inside hitbox, minimum 14px size for visibility
            div.innerHTML = `
                <div style="
                    position: absolute;
                    top: 50%; left: 50%;
                    transform: translate(-50%, -50%) rotate(${rotation}deg);
                    width: max(${sizePercent}cqw, 14px);
                    height: max(${sizePercent}cqw, 14px);
                ">
                    ${obj.svg}
                </div>
            `;

            const isDecoy = this.decoyObjects.includes(obj);
            div.addEventListener('click', (e) => {
                e.stopPropagation(); // prevent wrong tap
                if (isDecoy) {
                    this.wrongTap(obj.x, obj.y);
                } else {
                    this.correctTap(obj, div);
                }
            });

            layer.appendChild(div);
        });
    }

    correctTap(obj, element) {
        if (!this.isGameActive || this.foundItems.includes(obj.id)) return;

        this.foundItems.push(obj.id);
        
        // Play sound
        this.sfxCorrect.currentTime = 0;
        this.sfxCorrect.play().catch(() => {});

        // Particles
        this.createParticles(obj.x, obj.y);

        // Hide object
        element.style.pointerEvents = 'none';
        element.style.opacity = '0';
        element.style.transform = 'scale(0)';

        // Remove element from DOM after transition
        setTimeout(() => {
            if (element.parentNode) {
                element.parentNode.removeChild(element);
            }
        }, 200);

        // Update checklist
        const checkItem = document.getElementById(`check-${obj.id}`);
        if (checkItem) checkItem.classList.add('found');

        // Clear hint if active
        document.getElementById('hint-layer').innerHTML = '';

        if (this.foundItems.length === this.checklistObjects.length) {
            this.levelComplete();
        }
    }

    wrongTap(xPercent, yPercent) {
        if (!this.isGameActive) return;
        
        this.timer += 5; // 5-second penalty!
        this.updateHUD();
        
        this.sfxWrong.currentTime = 0;
        this.sfxWrong.play().catch(() => {});

        const gameScreen = document.getElementById('game-screen');
        gameScreen.classList.remove('shake');
        void gameScreen.offsetWidth; // trigger reflow
        gameScreen.classList.add('shake');

        // Create floating penalty indicator
        if (xPercent !== undefined && yPercent !== undefined) {
            this.createPenaltyIndicator(xPercent, yPercent);
        }
    }

    createPenaltyIndicator(xPercent, yPercent) {
        const layer = document.getElementById('hint-layer');
        if (!layer) return;

        const indicator = document.createElement('div');
        indicator.className = 'penalty-indicator';
        indicator.innerText = '+5s ❌';
        indicator.style.left = `${xPercent}%`;
        indicator.style.top = `${yPercent}%`;
        layer.appendChild(indicator);

        setTimeout(() => {
            if (indicator.parentNode) {
                indicator.parentNode.removeChild(indicator);
            }
        }, 1000);
    }

    useHint() {
        if (this.hintsRemaining <= 0 || !this.isGameActive) return;

        const missingObjects = this.checklistObjects.filter(obj => !this.foundItems.includes(obj.id));
        if (missingObjects.length === 0) return;

        this.hintsRemaining--;
        this.updateHUD();

        // Pick random missing object
        const target = missingObjects[Math.floor(Math.random() * missingObjects.length)];

        const hintLayer = document.getElementById('hint-layer');
        hintLayer.innerHTML = '';
        
        const glow = document.createElement('div');
        glow.className = 'hint-glow';
        glow.style.left = `${target.x}%`;
        glow.style.top = `${target.y}%`;
        
        // Make the hint circle scale responsively as a percentage of the board
        const hintSizePercent = (target.size * 3) / 10.24; 
        glow.style.width = `${hintSizePercent}cqw`;
        glow.style.height = `${hintSizePercent}cqw`;

        hintLayer.appendChild(glow);
        
        // Remove hint after 3 seconds
        setTimeout(() => {
            if (glow.parentNode) glow.parentNode.removeChild(glow);
        }, 3000);
    }

    createParticles(xPercent, yPercent) {
        const layer = document.getElementById('hint-layer');
        for (let i = 0; i < 8; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = `${xPercent}%`;
            p.style.top = `${yPercent}%`;
            
            // Random explosion direction
            const angle = (Math.PI * 2 / 8) * i;
            const distance = 100 + Math.random() * 50;
            const tx = Math.cos(angle) * distance + 'px';
            const ty = Math.sin(angle) * distance + 'px';
            
            p.style.setProperty('--tx', tx);
            p.style.setProperty('--ty', ty);
            
            layer.appendChild(p);
            
            setTimeout(() => {
                if (p.parentNode) p.parentNode.removeChild(p);
            }, 800);
        }
    }

    startTimer() {
        clearInterval(this.timerInterval);
        this.timerInterval = setInterval(() => {
            this.timer++;
            this.updateHUD();
        }, 1000);
    }

    updateHUD() {
        const mins = Math.floor(this.timer / 60).toString().padStart(2, '0');
        const secs = (this.timer % 60).toString().padStart(2, '0');
        document.getElementById('timer-display').innerText = `${mins}:${secs}`;

        const hintBtn = document.getElementById('btn-hint');
        document.getElementById('hint-count').innerText = this.hintsRemaining;
        if (this.hintsRemaining <= 0) {
            hintBtn.disabled = true;
        } else {
            hintBtn.disabled = false;
        }
    }

    levelComplete() {
        this.isGameActive = false;
        clearInterval(this.timerInterval);
        
        this.sfxWin.play().catch(() => {});

        // Calculate stars strictly based on time and hints
        let stars = 3;
        if (this.timer >= 30 || this.hintsRemaining < 2) stars = 2;
        if (this.timer >= 60) stars = 1;
        stars = Math.max(1, stars);

        // Save progress
        const progress = JSON.parse(localStorage.getItem('hw_progress') || '{}');
        progress[this.currentLevel.id] = { stars: stars, time: this.timer };
        localStorage.setItem('hw_progress', JSON.stringify(progress));

        // Show modal
        const starHtml = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
        document.getElementById('level-stars').innerHTML = starHtml;
        
        const mins = Math.floor(this.timer / 60);
        const secs = this.timer % 60;
        document.getElementById('level-time-msg').innerText = `You found everything in ${mins > 0 ? mins + 'm ' : ''}${secs}s!`;
        
        document.getElementById('level-complete-modal').classList.remove('hidden');
    }
}
</script>
    <script>document.addEventListener('DOMContentLoaded', () => {
    const game = new GameManager();

    // DOM Elements
    const screenSplash = document.getElementById('splash-screen');
    const screenMap = document.getElementById('level-select-screen');
    const screenGame = document.getElementById('game-screen');
    const modalComplete = document.getElementById('level-complete-modal');

    function showScreen(screen) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        screen.classList.add('active');
    }

    // Navigation
    document.getElementById('btn-play').addEventListener('click', () => {
        renderMap();
        showScreen(screenMap);
    });

    document.getElementById('btn-back-splash').addEventListener('click', () => {
        showScreen(screenSplash);
    });

    document.getElementById('btn-back-map').addEventListener('click', () => {
        game.isGameActive = false;
        clearInterval(game.timerInterval);
        renderMap();
        showScreen(screenMap);
    });

    document.getElementById('btn-next-level').addEventListener('click', () => {
        modalComplete.classList.add('hidden');
        renderMap();
        showScreen(screenMap);
    });

    function renderMap() {
        const nodesContainer = document.querySelector('.level-nodes');
        nodesContainer.innerHTML = '';

        const progress = JSON.parse(localStorage.getItem('hw_progress') || '{}');



        let nextUpAssigned = false;

        LEVELS.forEach((level, index) => {
            const node = document.createElement('div');
            node.className = 'level-node';
            node.style.left = `${level.mapPos.x}%`;
            node.style.top = `${level.mapPos.y}%`;

            // Check if locked
            // Level 1 is always unlocked. Others unlock if previous level is in progress dict
            const isLocked = index > 0 && !progress[LEVELS[index - 1].id];
            const isCompleted = !!progress[level.id];

            if (isLocked) {
                node.classList.add('locked');
                node.innerHTML = `
                    <span class="node-icon">🔒</span>
                    <span class="node-label">Locked</span>
                `;
            } else {
                node.innerHTML = `
                    <span class="node-icon">${level.icon}</span>
                    <span class="node-label">${level.name}</span>
                `;

                if (isCompleted) {
                    node.classList.add('completed');
                    const stars = progress[level.id].stars;
                    node.innerHTML += `<div class="node-stars">${'⭐'.repeat(stars)}</div>`;
                } else if (!nextUpAssigned) {
                    // Draw the eye straight to the next world to play.
                    node.classList.add('next-up');
                    node.innerHTML += `<span class="node-pointer">👉 Tap!</span>`;
                    nextUpAssigned = true;
                }

                node.addEventListener('click', () => {
                    game.startLevel(level);
                    showScreen(screenGame);
                });
            }

            nodesContainer.appendChild(node);
        });
    }
});
</script>

<!-- CONCEPT: Kids Arcade Hub — launcher grid linking to all locally-hosted kids apps; tapping a card opens the app in a new tab. -->
<!-- FIX 2026-06-26: All Netlify URLs replaced with local relative paths (Netlify subscription cancelled); removed broken service-worker registration and missing apple-touch-icon reference. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Kids Arcade</title>
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Kids Arcade">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0b1a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100dvh;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: env(safe-area-inset-top, 16px) 20px 8px;
      padding-top: max(env(safe-area-inset-top), 24px);
    }

    header h1 {
      font-size: clamp(24px, 5vw, 36px);
      font-weight: 900;
      letter-spacing: 1.2px;
    }

    .hdr-emoji { font-size: 32px; line-height: 1; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 12px;
      padding-bottom: max(env(safe-area-inset-bottom), 12px);
    }

    @media (min-width: 600px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }

    .card {
      aspect-ratio: 0.9;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      padding: 12px;
      text-decoration: none;
      color: #fff;
      border: 1.5px solid transparent;
      transition: transform 0.12s ease, opacity 0.12s ease;
      user-select: none;
    }

    .card:active {
      transform: scale(0.95);
      opacity: 0.85;
    }

    .card-emoji { font-size: 52px; line-height: 1; }

    .card-name {
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      line-height: 1.2;
      max-width: 100%;
    }
  </style>
</head>
<body>
  <header>
    <span class="hdr-emoji">🕹️</span>
    <h1>Kids Arcade</h1>
  </header>
  <main class="grid" id="grid"></main>

  <script>
    const apps = [
      { name: 'Carnival Games',   url: './play-carnival.html',           color: '#7c3aed', emoji: '🎡' },
      { name: 'Drawing & Colors', url: '../art_apps/draw-and-color.html',color: '#ec4899', emoji: '🎨' },
      { name: 'Math Worksheets',  url: '../Educational Apps/kids-math-play.html', color: '#0ea5e9', emoji: '🔢' },
      { name: 'Hidden Objects',   url: './find-it-game.html',            color: '#16a34a', emoji: '🔍' },
      { name: 'Splashy & Bubbles',url: './2026-06-26-splashy-bubbles.html', color: '#06b6d4', emoji: '💧' },
      { name: 'Cartoon Coach',    url: './2026-06-26-cartoon-coach.html', color: '#4f46e5', emoji: '🎮' },
      { name: 'Song Maker',       url: '../music_apps/song-maker.html',  color: '#f59e0b', emoji: '🎵' },
      { name: 'Party Commands',   url: '../party_apps/2026-06-26-party-command-games.html', color: '#f97316', emoji: '🎉' },
      { name: 'Memory Game',      url: './2026-06-26-ranked-memory-match.html', color: '#8b5cf6', emoji: '🧠' },
    ];

    function hexToRgb(hex) {
      return [
        parseInt(hex.slice(1, 3), 16),
        parseInt(hex.slice(3, 5), 16),
        parseInt(hex.slice(5, 7), 16),
      ].join(', ');
    }

    const grid = document.getElementById('grid');
    for (const app of apps) {
      const rgb = hexToRgb(app.color);
      const a = document.createElement('a');
      a.href = app.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.className = 'card';
      a.style.cssText = `
        background: linear-gradient(135deg, rgba(${rgb}, 0.85) 0%, rgba(${rgb}, 0.4) 100%);
        box-shadow: 0 4px 12px rgba(${rgb}, 0.4);
        border-color: rgba(${rgb}, 0.3);
      `;
      a.innerHTML = `<span class="card-emoji">${app.emoji}</span><span class="card-name">${app.name}</span>`;
      grid.appendChild(a);
    }

  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Spot the Difference!</title>
<style>
:root {
    --primary: #FF6B6B;
    --secondary: #4ECDC4;
    --accent: #FFE66D;
    --dark: #2C3E50;
    --light: #F7FFF7;
    --success: #6BCB77;
    --font-game: 'Baloo 2', 'Comic Sans MS', system-ui, sans-serif;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}

html, body {
    height: 100%;
    overflow: hidden;
}

body {
    font-family: var(--font-game);
    background: var(--dark);
    color: var(--dark);
}

#app {
    position: relative;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    background: var(--light);
    overflow: hidden;
}

.screen {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
}
.screen.active { display: flex; }

/* ---------- Start Screen ---------- */
#screen-start {
    background: linear-gradient(135deg, var(--secondary), var(--primary));
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
    padding: 2rem;
}
.start-title {
    font-size: 3rem;
    font-weight: 900;
    text-shadow: 4px 4px 0 rgba(0,0,0,0.2);
    animation: float 3s ease-in-out infinite;
    margin-bottom: 0.5rem;
}
.start-sub {
    font-size: 1.3rem;
    font-weight: 700;
    max-width: 32rem;
    margin-bottom: 2rem;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.15);
}
.start-emojis {
    font-size: 2.5rem;
    margin-bottom: 1.5rem;
}

/* ---------- Buttons ---------- */
.btn-primary {
    background: var(--accent);
    color: var(--dark);
    font-family: var(--font-game);
    font-weight: 900;
    font-size: 1.7rem;
    padding: 0.9rem 2.4rem;
    border: 4px solid var(--dark);
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 8px 0 var(--dark);
    transition: transform 0.1s, box-shadow 0.1s;
}
.btn-primary:active {
    transform: translateY(8px);
    box-shadow: 0 0 0 var(--dark);
}

.btn-icon {
    background: white;
    border: 3px solid var(--dark);
    border-radius: 50%;
    width: 46px; height: 46px;
    min-width: 46px;
    font-size: 1.3rem;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--dark);
    transition: transform 0.1s, box-shadow 0.1s;
}
.btn-icon:active {
    transform: translateY(4px);
    box-shadow: 0 0 0 var(--dark);
}

.btn-action {
    background: var(--accent);
    border: 3px solid var(--dark);
    border-radius: 20px;
    padding: 0.5rem 1rem;
    font-family: var(--font-game);
    font-weight: 800;
    font-size: 1.05rem;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--dark);
    white-space: nowrap;
    transition: transform 0.1s, box-shadow 0.1s;
}
.btn-action:active {
    transform: translateY(4px);
    box-shadow: 0 0 0 var(--dark);
}
.btn-action:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: 0 4px 0 var(--dark);
}

/* ---------- Game Screen ---------- */
#screen-game { background: var(--light); }

.game-header {
    background: white;
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 4px solid var(--dark);
    z-index: 10;
}
.round-title { flex: 1; text-align: center; min-width: 0; }
.round-title h2 {
    font-size: 1.3rem;
    font-weight: 900;
    color: var(--primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.round-title span {
    display: block;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--dark);
    opacity: 0.7;
}
.header-actions { display: flex; align-items: center; gap: 8px; }

.found-bar {
    background: var(--dark);
    color: white;
    padding: 6px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 10;
}
#found-text {
    font-weight: 800;
    font-size: 0.95rem;
    white-space: nowrap;
}
.dots {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
}
.dot {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    transition: transform 0.3s, background 0.3s;
}
.dot.found {
    background: var(--success);
    border-color: var(--success);
    transform: scale(1.15);
}

.panels-wrap {
    flex: 1;
    min-height: 0;
    display: flex;
    gap: 12px;
    padding: 12px;
    overflow-y: auto;
    background: #dfeff5;
}
@media (max-width: 760px) {
    .panels-wrap { flex-direction: column; }
}

.panel {
    position: relative;
    flex: 1;
    min-width: 0;
    aspect-ratio: 4 / 3;
    border: 4px solid var(--dark);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 6px 0 var(--dark);
    background: #fff;
    cursor: pointer;
}
.panel-label {
    position: absolute;
    top: 6px; left: 6px;
    background: white;
    border: 2px solid var(--dark);
    border-radius: 10px;
    padding: 2px 10px;
    font-weight: 800;
    font-size: 0.85rem;
    z-index: 6;
}
.panel-bg {
    position: absolute;
    inset: 0;
    pointer-events: none;
}
.items-layer, .fx-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
}
.scene-item {
    position: absolute;
    line-height: 1;
    transform: translate(-50%, -50%);
    filter: drop-shadow(1px 2px 1px rgba(0,0,0,0.25));
}

.hint-ring {
    position: absolute;
    width: 4.2rem;
    height: 4.2rem;
    border: 5px dashed var(--accent);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    animation: pulseGlow 1.1s ease-in-out infinite;
    pointer-events: none;
}

.found-halo {
    position: absolute;
    width: 5.2rem;
    height: 5.2rem;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(255,230,109,0.9) 0%, rgba(255,230,109,0.35) 45%, rgba(255,230,109,0) 72%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.1rem;
    animation: haloPop 0.9s ease-out forwards;
    pointer-events: none;
}

.nope-ring {
    position: absolute;
    width: 2.6rem;
    height: 2.6rem;
    border: 3px solid rgba(44,62,80,0.4);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    animation: nopeFade 0.4s ease-out forwards;
    pointer-events: none;
}

@keyframes pulseGlow {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.55; }
    50% { transform: translate(-50%, -50%) scale(1.25); opacity: 1; }
}
@keyframes haloPop {
    0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
    35% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
}
@keyframes nopeFade {
    0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0.7; }
    100% { transform: translate(-50%, -50%) scale(1.3); opacity: 0; }
}
@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}
@keyframes popIn {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

/* ---------- Modals ---------- */
.modal {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 1rem;
}
.modal.hidden { display: none; }
.modal-content {
    background: white;
    padding: 2.2rem 2rem;
    border-radius: 30px;
    text-align: center;
    border: 6px solid var(--primary);
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    max-width: 26rem;
}
.modal-content h2 {
    font-size: 2rem;
    font-weight: 900;
    color: var(--primary);
    margin-bottom: 0.8rem;
}
.modal-stars {
    font-size: 3rem;
    margin-bottom: 0.8rem;
}
.modal-content p {
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
    color: var(--dark);
}
</style>
</head>

    <!-- Game Screen -->

        <div class="panels-wrap">

    </section>

    <!-- Round Complete Modal -->
    <div id="modal-round-complete" class="modal hidden">
        <div class="modal-content">
            <h2>Round Complete! ⭐</h2>
            <div class="modal-stars" id="round-stars"></div>
            <p id="round-summary"></p>
            <button id="btn-next-round" class="btn-primary">Next Round ▶️</button>

    </div>

    <!-- Finale Modal -->
    <div id="modal-finale" class="modal hidden">
        <div class="modal-content">
            <h2>You Found It All! 🎉</h2>
            <div class="modal-stars">🏆</div>
            <p id="finale-summary"></p>
            <button id="btn-play-again" class="btn-primary">Play Again</button>
        </div>
    </div>

</div>

                  hitLeft: { top: 66, left: 12 }, hitRight: { top: 66, left: 12 } },
                { type: "recolor",
                  left: { emoji: "🎈", top: 42, left: 87, size: 2.2 },
                  right: { emoji: "🎈", top: 42, left: 87, size: 2.2, hue: 300 },
                  hitLeft: { top: 42, left: 87 }, hitRight: { top: 42, left: 87 } },
                { type: "moved",
                  left: { emoji: "🎁", top: 18, left: 12, size: 2.2 },
                  right: { emoji: "🎁", top: 66, left: 62, size: 2.2 },
                  hitLeft: { top: 18, left: 12 }, hitRight: { top: 66, left: 62 } },
                { type: "missing",
                  left: { emoji: "⭐", top: 18, left: 87, size: 1.8 },
                  right: null,
                  hitLeft: { top: 18, left: 87 }, hitRight: { top: 18, left: 87 } },
                { type: "resize",
                  left: { emoji: "🧁", top: 90, left: 37, size: 2 },
                  right: { emoji: "🧁", top: 90, left: 37, size: 4.2 },
                  hitLeft: { top: 90, left: 37 }, hitRight: { top: 90, left: 37 } }
            ]
        }
    ];

    var PRAISE_LINES = ["Great eye!", "You found it!", "Nice spotting!", "Sharp eyes!", "Awesome!"];
    var ROUND_START_LINES = ["Can you spot what's different?", "Look closely at both pictures!", "Something has changed — can you find it?"];

    var els = {};
    var state = {
        roundIndex: 0,
        currentRound: null,
        foundCount: 0,
        hintsRemaining: 3,
        elapsedSeconds: 0,
        timerInterval: null,
        roundActive: false,
        speechEnabled: true,
        roundStars: []
    };

    var audioCtx = null;

    function $(id) { return document.getElementById(id); }

    function cacheEls() {
        els.screenStart = $("screen-start");
        els.screenGame = $("screen-game");
        els.btnPlay = $("btn-play");
        els.btnHome = $("btn-home");
        els.btnMute = $("btn-mute");
        els.btnHint = $("btn-hint");
        els.hintCount = $("hint-count");
        els.roundName = $("round-name");
        els.roundProgress = $("round-progress");
        els.foundText = $("found-text");
        els.checklistDots = $("checklist-dots");
        els.panelLeft = $("panel-left");
        els.panelRight = $("panel-right");
        els.bgLeft = $("bg-left");
        els.bgRight = $("bg-right");
        els.itemsLeft = $("items-left");
        els.itemsRight = $("items-right");
        els.fxLeft = $("fx-left");
        els.fxRight = $("fx-right");
        els.modalRoundComplete = $("modal-round-complete");
        els.roundStars = $("round-stars");
        els.roundSummary = $("round-summary");
        els.btnNextRound = $("btn-next-round");
        els.modalFinale = $("modal-finale");
        els.finaleSummary = $("finale-summary");
        els.btnPlayAgain = $("btn-play-again");
    }

    function showScreen(name) {
        els.screenStart.classList.toggle("active", name === "start");
        els.screenGame.classList.toggle("active", name === "game");
    }

    /* ---------- Audio ---------- */
    function getAudioCtx() {
        if (!audioCtx) {
            var AC = window.AudioContext || window.webkitAudioContext;
            if (!AC) return null;
            audioCtx = new AC();
        }
        if (audioCtx.state === "suspended") audioCtx.resume();
        return audioCtx;
    }

    function playChime() {
        var ctx = getAudioCtx();
        if (!ctx) return;
        try {
            var now = ctx.currentTime;
            var osc = ctx.createOscillator();
            var gain = ctx.createGain();
            osc.type = "sine";
            osc.frequency.setValueAtTime(880, now);
            osc.frequency.exponentialRampToValueAtTime(1320, now + 0.15);
            gain.gain.setValueAtTime(0.0001, now);
            gain.gain.exponentialRampToValueAtTime(0.3, now + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now);
            osc.stop(now + 0.4);
        } catch (e) { /* ignore audio failures */ }
    }

    /* ---------- Speech ---------- */
    function speak(text) {
        if (!state.speechEnabled) return;
        if (!("speechSynthesis" in window)) return;
        try {
            window.speechSynthesis.cancel();
            var u = new SpeechSynthesisUtterance(text);
            u.rate = 1.0;
            u.pitch = 1.15;
            window.speechSynthesis.speak(u);
        } catch (e) { /* ignore speech failures */ }
    }

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    /* ---------- Rendering ---------- */
    function makeItemEl(it) {
        var el = document.createElement("div");
        el.className = "scene-item";
        el.style.top = it.top + "%";
        el.style.left = it.left + "%";
        el.style.fontSize = (it.size || 2.5) + "rem";
        if (it.hue) {
            el.style.filter = "hue-rotate(" + it.hue + "deg) drop-shadow(1px 2px 1px rgba(0,0,0,0.25))";
        }
        el.textContent = it.emoji;
        return el;
    }

    function renderPanel(side) {
        var round = state.currentRound;
        var container = side === "left" ? els.itemsLeft : els.itemsRight;
        container.innerHTML = "";
        round.shared.forEach(function (it) {
            container.appendChild(makeItemEl(it));
        });
        round.diffs.forEach(function (d) {
            var it = side === "left" ? d.left : d.right;
            if (it) container.appendChild(makeItemEl(it));
        });
    }

    function renderChecklist() {
        var round = state.currentRound;
        els.checklistDots.innerHTML = "";
        round.diffs.forEach(function () {
            var dot = document.createElement("div");
            dot.className = "dot";
            els.checklistDots.appendChild(dot);
        });
        updateFoundText();
    }

    function updateFoundText() {
        var round = state.currentRound;
        els.foundText.textContent = state.foundCount + " of " + round.diffs.length + " found";
        var dots = els.checklistDots.children;
        for (var i = 0; i < round.diffs.length; i++) {
            dots[i].classList.toggle("found", !!round.diffs[i].found);
            dots[i].textContent = round.diffs[i].found ? "✓" : "";
        }
    }

    function updateHUD() {
        els.hintCount.textContent = state.hintsRemaining;
        els.btnHint.disabled = state.hintsRemaining <= 0;
    }

    /* ---------- Effects ---------- */
    function spawnEffect(side, hit, className, life, content) {
        var layer = side === "left" ? els.fxLeft : els.fxRight;
        var el = document.createElement("div");
        el.className = className;
        el.style.top = hit.top + "%";
        el.style.left = hit.left + "%";
        if (content) el.textContent = content;
        layer.appendChild(el);
        window.setTimeout(function () {
            if (el.parentNode) el.parentNode.removeChild(el);
        }, life);
    }

    function showHalo(side, hit) {
        spawnEffect(side, hit, "found-halo", 900, "✨");
    }

    function showHintRing(side, hit) {
        spawnEffect(side, hit, "hint-ring", 3000, "");
    }

    function showNope(side, top, left) {
        spawnEffect(side, { top: top, left: left }, "nope-ring", 400, "");
    }

    /* ---------- Gameplay ---------- */
    function handleTap(e, side) {
        if (!state.roundActive) return;
        var panelEl = side === "left" ? els.panelLeft : els.panelRight;
        var rect = panelEl.getBoundingClientRect();
        var xPct = ((e.clientX - rect.left) / rect.width) * 100;
        var yPct = ((e.clientY - rect.top) / rect.height) * 100;
        var minDim = Math.min(rect.width, rect.height);
        var radiusPx = (HIT_RADIUS_PCT / 100) * minDim;

        var diffs = state.currentRound.diffs;
        var hitDiff = null;
        for (var i = 0; i < diffs.length; i++) {
            var d = diffs[i];
            if (d.found) continue;
            var hit = side === "left" ? d.hitLeft : d.hitRight;
            var dx = ((xPct - hit.left) / 100) * rect.width;
            var dy = ((yPct - hit.top) / 100) * rect.height;
            if (Math.sqrt(dx * dx + dy * dy) <= radiusPx) {
                hitDiff = d;
                break;
            }
        }

        if (hitDiff) {
            onFound(hitDiff);
        } else {
            showNope(side, yPct, xPct);
        }
    }

    function onFound(diff) {
        diff.found = true;
        state.foundCount++;
        playChime();
        speak(pick(PRAISE_LINES));
        showHalo("left", diff.hitLeft);
        showHalo("right", diff.hitRight);
        updateFoundText();
        if (state.foundCount >= state.currentRound.diffs.length) {
            roundComplete();
        }
    }

    function useHint() {
        if (state.hintsRemaining <= 0 || !state.roundActive) return;
        var target = null;
        var diffs = state.currentRound.diffs;
        for (var i = 0; i < diffs.length; i++) {
            if (!diffs[i].found) { target = diffs[i]; break; }
        }
        if (!target) return;
        state.hintsRemaining--;
        updateHUD();
        showHintRing("left", target.hitLeft);
        showHintRing("right", target.hitRight);
        speak("Look closely here!");
    }

    /* ---------- Timer ---------- */
    function startTimer() {
        if (state.timerInterval) {
            window.clearInterval(state.timerInterval);
            state.timerInterval = null;
        }
        state.timerInterval = window.setInterval(function () {
            state.elapsedSeconds++;
        }, 1000);
    }

    function stopTimer() {
        if (state.timerInterval) {
            window.clearInterval(state.timerInterval);
            state.timerInterval = null;
        }
    }

    /* ---------- Round flow ---------- */
    function startRound(index) {
        stopTimer();
        state.roundIndex = index;
        var round = ROUNDS[index];
        round.diffs.forEach(function (d) { d.found = false; });
        state.currentRound = round;
        state.foundCount = 0;
        state.hintsRemaining = 3;
        state.elapsedSeconds = 0;
        state.roundActive = true;

        els.roundName.textContent = round.name;
        els.roundProgress.textContent = "Round " + (index + 1) + " of " + ROUNDS.length;
        els.bgLeft.style.background = round.bg;
        els.bgRight.style.background = round.bg;
        els.fxLeft.innerHTML = "";
        els.fxRight.innerHTML = "";

        renderPanel("left");
        renderPanel("right");
        renderChecklist();
        updateHUD();
        startTimer();
        showScreen("game");
        speak(pick(ROUND_START_LINES));
    }

    function formatTime(totalSeconds) {
        var m = Math.floor(totalSeconds / 60);
        var s = totalSeconds % 60;
        return m + "m " + (s < 10 ? "0" : "") + s + "s";
    }

    function roundComplete() {
        state.roundActive = false;
        stopTimer();
        playChime();
        speak("Round complete! Great job!");

        var hintsUsed = 3 - state.hintsRemaining;
        var stars = 3;
        if (hintsUsed >= 3) stars = 1;
        else if (hintsUsed > 0) stars = 2;
        state.roundStars.push(stars);

        els.roundStars.textContent = "⭐".repeat(stars) + "☆".repeat(3 - stars);
        els.roundSummary.textContent = "You found all " + state.currentRound.diffs.length +
            " differences in " + formatTime(state.elapsedSeconds) +
            " using " + hintsUsed + (hintsUsed === 1 ? " hint" : " hints") + ".";

        els.btnNextRound.textContent = (state.roundIndex + 1 < ROUNDS.length) ? "Next Round ▶️" : "See Results 🏆";
        els.modalRoundComplete.classList.remove("hidden");
    }

    function nextRoundOrFinale() {
        els.modalRoundComplete.classList.add("hidden");
        if (state.roundIndex + 1 < ROUNDS.length) {
            startRound(state.roundIndex + 1);
        } else {
            showFinale();
        }
    }

    function showFinale() {
        var totalStars = state.roundStars.reduce(function (a, b) { return a + b; }, 0);
        var maxStars = ROUNDS.length * 3;
        els.finaleSummary.textContent = "You spotted every difference in all " + ROUNDS.length +
            " pictures and earned " + totalStars + " out of " + maxStars + " stars. Amazing eyes!";
        els.modalFinale.classList.remove("hidden");
        speak("You found every difference! Amazing job, detective!");
    }

    function goHome() {
        state.roundActive = false;
        stopTimer();
        els.modalRoundComplete.classList.add("hidden");
        els.modalFinale.classList.add("hidden");
        showScreen("start");
    }

    function toggleMute() {
        state.speechEnabled = !state.speechEnabled;
        els.btnMute.textContent = state.speechEnabled ? "🔊" : "🔇";
        if (!state.speechEnabled && "speechSynthesis" in window) {
            try { window.speechSynthesis.cancel(); } catch (e) { /* ignore */ }
        }
    }

    /* ---------- Init ---------- */
    document.addEventListener("DOMContentLoaded", function () {
        cacheEls();

        els.btnPlay.addEventListener("click", function () {
            state.roundStars = [];
            startRound(0);
        });
        els.btnHome.addEventListener("click", goHome);
        els.btnMute.addEventListener("click", toggleMute);
        els.btnHint.addEventListener("click", useHint);
        els.btnNextRound.addEventListener("click", nextRoundOrFinale);
        els.btnPlayAgain.addEventListener("click", function () {
            els.modalFinale.classList.add("hidden");
            state.roundStars = [];
            startRound(0);
        });

        els.panelLeft.addEventListener("click", function (e) { handleTap(e, "left"); });
        els.panelRight.addEventListener("click", function (e) { handleTap(e, "right"); });
    });
})();
</script>
</body>
</html>
